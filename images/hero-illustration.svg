<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="skin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8467F8"/>
      <stop offset="1" stop-color="#5B3DF5"/>
    </linearGradient>
    <linearGradient id="deskg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17A163"/>
      <stop offset="1" stop-color="#0E7A47"/>
    </linearGradient>
  </defs>

  <!-- floor shadow -->
  <ellipse cx="300" cy="520" rx="180" ry="24" fill="#15132B" opacity="0.06"/>

  <!-- desk -->
  <rect x="140" y="420" width="320" height="18" rx="9" fill="url(#deskg)"/>
  <rect x="170" y="438" width="16" height="60" rx="6" fill="#0E7A47"/>
  <rect x="414" y="438" width="16" height="60" rx="6" fill="#0E7A47"/>

  <!-- laptop -->
  <rect x="230" y="330" width="140" height="92" rx="10" fill="#15132B"/>
  <rect x="240" y="340" width="120" height="72" rx="4" fill="#F6F4FC"/>
  <rect x="252" y="352" width="60" height="8" rx="4" fill="#5B3DF5"/>
  <rect x="252" y="368" width="96" height="6" rx="3" fill="#C9C3EE"/>
  <rect x="252" y="380" width="80" height="6" rx="3" fill="#C9C3EE"/>
  <rect x="210" y="422" width="180" height="10" rx="5" fill="#0F0D22"/>

  <!-- person body -->
  <ellipse cx="300" cy="260" rx="46" ry="52" fill="url(#skin)"/>
  <circle cx="300" cy="190" r="34" fill="#2A2650"/>
  <circle cx="300" cy="196" r="27" fill="#E9C9A6"/>
  <path d="M270 188c4-20 56-20 60 0-6-8-54-8-60 0z" fill="#2A2650"/>

  <!-- arms -->
  <path d="M258 250c-18 10-30 34-26 60l20-4c-2-18 6-34 20-42z" fill="url(#skin)"/>
  <path d="M342 250c18 10 30 34 26 60l-20-4c2-18-6-34-20-42z" fill="url(#skin)"/>

  <!-- floating cards -->
  <g opacity="0.95">
    <rect x="90" y="140" width="100" height="66" rx="12" fill="#fff" stroke="#E7E3F5" stroke-width="2"/>
    <rect x="104" y="156" width="40" height="8" rx="4" fill="#17A163"/>
    <rect x="104" y="172" width="72" height="6" rx="3" fill="#DFDBF2"/>
    <rect x="104" y="184" width="56" height="6" rx="3" fill="#DFDBF2"/>
  </g>

  <g opacity="0.95">
    <rect x="410" y="110" width="110" height="72" rx="12" fill="#fff" stroke="#E7E3F5" stroke-width="2"/>
    <circle cx="432" cy="132" r="10" fill="#5B3DF5"/>
    <rect x="450" y="126" width="52" height="6" rx="3" fill="#DFDBF2"/>
    <rect x="450" y="138" width="36" height="6" rx="3" fill="#DFDBF2"/>
    <rect x="422" y="152" width="80" height="14" rx="7" fill="#F6F4FC"/>
  </g>

  <circle cx="470" cy="260" r="7" fill="#17A163"/>
  <circle cx="110" cy="330" r="9" fill="#5B3DF5" opacity="0.5"/>
  <path d="M460 330l6 6-6 6-6-6z" fill="#E08A00"/>
</svg>
